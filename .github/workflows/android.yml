name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup gradle.properties with AndroidX configuration
      run: |
        if [ ! -f gradle.properties ]; then
          cat > gradle.properties << EOF
        android.useAndroidX=true
        android.enableJetifier=true
        EOF
        else
          # Ensure AndroidX settings exist without duplicating
          grep -q "android.useAndroidX" gradle.properties || echo "android.useAndroidX=true" >> gradle.properties
          grep -q "android.enableJetifier" gradle.properties || echo "android.enableJetifier=true" >> gradle.properties
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Build with Gradle
      run: ./gradlew build

    - name: Run tests
      run: ./gradlew test
